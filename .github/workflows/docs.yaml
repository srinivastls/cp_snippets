name: Build and Deploy Docs

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install docs dependencies
        run: |
          pip install -r requirements.txt

      - name: Deploy docs
        run: |
          mkdocs gh-deploy --force
